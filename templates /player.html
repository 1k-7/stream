<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0f19;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            font-size: 90%; 
        }
        h1, h2, h3, h4, h5, h6 {
            /* Headings remain untouched */
            color: #ffffff;
            margin-bottom: 1rem;
        }
        .video-container {
            width: 100%;
            max-width: 960px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        .plyr--video { --plyr-color-main: #3b82f6; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="player" playsinline controls crossorigin></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const video = document.getElementById('player');
        const source = "{{ video_url }}";
        
        const defaultOptions = {
            controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            seekTime: 10
        };

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(source);
            
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                const player = new Plyr(video, defaultOptions);
            });
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Fallback for native Apple devices (Safari)
            video.src = source;
            const player = new Plyr(video, defaultOptions);
        }
        
        // Double-tap seek logic remains identical
        const plyrContainer = document.querySelector('.video-container');
        let lastTap = 0;
        plyrContainer.addEventListener('touchend', function (e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                e.preventDefault();
                const rect = plyrContainer.getBoundingClientRect();
                const touchX = e.changedTouches[0].clientX - rect.left;
                if (touchX < (rect.width / 2)) {
                    video.currentTime -= 10;
                } else {
                    video.currentTime += 10;
                }
            }
            lastTap = currentTime;
        });
    });
</script>
</body>
</html>
